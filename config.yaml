# config.yaml

system:
  video_path: "data/videos/traffic.mp4"
  model_path: "models/yolov8s.onnx"   
  db_path: "traffic_system.db"
  screen_width: 1366
  screen_height: 768

ai:
  conf_threshold: 0.4
  # Includes 0 to detect Persons/Pedestrians for VRU
  vehicle_classes: [0, 2, 3, 5, 7] # COCO: 0:person, 2:car, 3:motorcycle, 5:bus, 7:truck
  tracker_type: "bytetrack.yaml"

traffic_light:
  green_time_base: 10
  yellow_time: 3
  max_green_time: 25

speed_estimation:
  line_1_y: 1500            # Top virtual line (Speed Trap Start)
  line_2_y: 1600            # Bottom virtual line (Red Light Line / Speed Trap End)
  distance_meters: 5.0      # Real-world distance between the two lines in meters
  speed_limit_kmh: 50.0

mqtt:
  broker: "broker.hivemq.com"
  port: 1883
  topic_light: "traffic/light"
  topic_violation: "traffic/violation"


# -------------------------------------------------
# 🚀 NEW ADVANCED ENTERPRISE FEATURES
# -------------------------------------------------

vru_protection:
  # Define the [X, Y] pixel coordinates of the crosswalk polygon
  # Adjust these coordinates based on your specific camera angle
  crosswalk_polygon: [[450, 600], [900, 600], [1100, 768], [250, 768]]

bev_homography:
  # To calculate real distance, we map a 2D trapezoid on the road to a 3D top-down rectangle
  src_points: [[500, 400], [800, 400], [1200, 700], [100, 700]]
  dst_points: [[0, 0], [400, 0], [400, 800], [0, 800]]
  pixels_per_meter: 25.0
  tailgating_threshold_meters: 2.5 # Minimum safe distance between cars

mlops_active_learning:
  enabled: true
  min_conf: 0.25  # Save images where AI is unsure (25% to 40% confident)
  max_conf: 0.40
  save_path: "data/needs_retraining"